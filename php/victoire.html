<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoPics - Victoire</title>
    <style>
        body {
            background-color: #050505;
            color: #ccc;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            border: 5px solid #ff3333;
            box-sizing: border-box;
            overflow: hidden;
        }

        h1 {
            color: #ff3333;
            font-size: 4rem;
            text-shadow: 0 0 20px #ff0000;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        p {
            font-size: 1.5rem;
            max-width: 600px;
            margin-bottom: 40px;
            line-height: 1.5;
        }

        .highlight {
            color: #ff3333;
            font-weight: bold;
        }

        .btn-action {
            background-color: transparent;
            color: #ff3333;
            border: 2px solid #ff3333;
            padding: 15px 30px;
            font-size: 1.5rem;
            font-family: inherit;
            cursor: pointer;
            text-transform: uppercase;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .btn-action:hover {
            background-color: #ff3333;
            color: #000;
            box-shadow: 0 0 15px #ff0000;
        }
    </style>
</head>
<body>

<h1>L'Aube se lève...</h1>

<p>
    Félicitations. Vous avez brisé le dernier sceau et repoussé l'entité.
    <br><br>
    Le Comte a été vaincu, et vous avez survécu à la <span class="highlight">Nuit Noire</span>.
    Votre âme est sauve... pour le moment.
</p>

<a href="../index.html" class="btn-action">Fuir et recommencer</a>

</body>
</html>
