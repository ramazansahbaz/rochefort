<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoPics - Victoire</title>
    <style>
        body {
            background-color: #050505;
            color: #ccc;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            border: 5px solid #ff3333;
            box-sizing: border-box;
            padding: 20px;
        }

        h1 { color: #ff3333; font-size: 3rem; text-shadow: 0 0 20px #ff0000; margin-top: 20px; }

        .stats-container {
            background: rgba(255, 0, 0, 0.1);
            border: 1px solid #ff3333;
            padding: 20px;
            margin: 20px 0;
            width: 90%;
            max-width: 500px;
        }

        .ratio-score { font-size: 2.5rem; color: #fff; font-weight: bold; margin: 10px 0; }

        .leaderboard {
            width: 100%;
            max-width: 500px;
            margin-top: 20px;
            border-collapse: collapse;
        }

        .leaderboard th { border-bottom: 2px solid #ff3333; padding: 10px; color: #ff3333; }
        .leaderboard td { padding: 12px; border-bottom: 1px solid #333; }
        .player-row { background: rgba(255, 255, 255, 0.1); color: #ff3333; font-weight: bold; animation: pulse 2s infinite; }

        @keyframes pulse {
            0% { box-shadow: inset 0 0 5px #ff3333; }
            50% { box-shadow: inset 0 0 20px #ff3333; }
            100% { box-shadow: inset 0 0 5px #ff3333; }
        }

        .btn-action {
            margin-top: 30px;
            display: inline-block;
            color: #ff3333;
            border: 2px solid #ff3333;
            padding: 15px 30px;
            text-decoration: none;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<h1>MISSION RÉUSSIE</h1>
<p>Le Comte a été neutralisé. Rochefort est saine et sauve.</p>

<div class="stats-container">
    <h3>VOTRE SCORE D'HONNEUR</h3>
    <div id="stats-details" style="font-size: 0.9rem; margin-bottom: 10px;"></div>
    <div class="ratio-score" id="final-ratio">0</div>
    <p id="commentary"></p>
</div>

<h3>CLASSEMENT DES CHASSEURS</h3>
<table class="leaderboard">
    <thead>
    <tr>
        <th>Rang</th>
        <th>Chasseur</th>
        <th>Score</th>
    </tr>
    </thead>
    <tbody id="leaderboard-body">
    </tbody>
</table>

<a href="../index.html" class="btn-action">Recommencer l'enquête</a>

<script>
    // 1. Récupération des données dans l'URL
    const params = new URLSearchParams(window.location.search);
    const timeLeft = parseInt(params.get('time')) || 0;
    const skips = parseInt(params.get('skips')) || 0;

    // 2. Calcul du Score
    // Formule : (Temps Restant) + (Points par énigme réussie sans aide)
    const totalSteps = 12;
    const cleanSteps = totalSteps - skips;
    const timeBonus = Math.floor(timeLeft / 10);
    const stepsBonus = cleanSteps * 1000;
    const finalScore = timeBonus + stepsBonus;

    // Affichage des détails
    document.getElementById('stats-details').innerHTML = `
            Énigmes pures : ${cleanSteps}/${totalSteps}<br>
            Bonus temps : +${timeBonus} pts
        `;
    document.getElementById('final-ratio').innerText = finalScore + " PTS";

    // Commentaire
    let commentary = "";
    if (skips === 0) commentary = "Légendaire ! Aucune aide utilisée.";
    else if (skips < 3) commentary = "Excellent travail d'enquête.";
    else commentary = "La victoire a eu un prix...";
    document.getElementById('commentary').innerText = commentary;

    // 3. Faux Classement
    const fakeData = [
        { name: "Van Helsing", score: 15400 },
        { name: "Mina H.", score: 13200 },
        { name: "Shadow Hunter", score: 11000 },
        { name: "Jonathan H.", score: 9500 },
        { name: "Renfield", score: 6000 }
    ];

    // On ajoute le joueur à la liste
    fakeData.push({ name: "VOUS", score: finalScore });

    // On trie par score
    fakeData.sort((a, b) => b.score - a.score);

    // Affichage
    const tbody = document.getElementById('leaderboard-body');
    fakeData.forEach((player, index) => {
        const row = document.createElement('tr');
        if (player.name === "VOUS") row.className = "player-row";

        row.innerHTML = `
                <td>#${index + 1}</td>
                <td>${player.name}</td>
                <td>${player.score}</td>
            `;
        tbody.appendChild(row);
    });
</script>
</body>
</html>
