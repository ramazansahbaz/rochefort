<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mission Échouée - Escape Game Rochefort</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: #e0e0e0;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-align: center;
        }

        .container {
            max-width: 600px;
            padding: 40px;
            border: 2px solid #660000;
            background: rgba(20, 0, 0, 0.8);
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.2);
            position: relative;
        }

        h1 {
            color: #ff3333;
            font-size: 3rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 5px;
            animation: glitch 1s infinite;
        }

        .message {
            font-size: 1.2rem;
            line-height: 1.6;
            margin-bottom: 30px;
            border-left: 3px solid #ff3333;
            padding-left: 20px;
            text-align: left;
        }

        .highlight {
            color: #ff3333;
            font-weight: bold;
        }

        .btn-retry {
            display: inline-block;
            padding: 15px 30px;
            background-color: #880000;
            color: white;
            text-decoration: none;
            font-weight: bold;
            border: 1px solid #ff3333;
            transition: all 0.3s ease;
            cursor: pointer;
            text-transform: uppercase;
        }

        .btn-retry:hover {
            background-color: #ff0000;
            box-shadow: 0 0 15px #ff0000;
        }

        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }

        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(
                    0deg,
                    rgba(0, 0, 0, 0.1),
                    rgba(0, 0, 0, 0.1) 1px,
                    transparent 1px,
                    transparent 2px
            );
            pointer-events: none;
        }
    </style>
</head>
<body>
<div class="overlay"></div>
<div class="container">
    <h1>ÉCHEC</h1>
    <div class="message">
        <p>Le dernier grain de sable est tombé...</p>
        <p>Vous avez échoué à intercepter le <span class="highlight">Comte</span> avant qu'il ne disparaisse dans les ombres du Château Comtal.</p>
        <p>Le <span class="highlight">douzième sceau</span> est perdu, et avec lui, le secret de Rochefort s'éteint pour l'éternité.</p>
    </div>

    <a href="index.html" class="btn-retry">Tenter une nouvelle faille temporelle</a>
</div>
</body>
</html>
